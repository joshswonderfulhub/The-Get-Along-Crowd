<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rose</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
height:100vh;
overflow:hidden;
font-family:'VT323', monospace;
}

#logScreen{
opacity:0;
pointer-events:none;
transition:opacity 2.5s ease;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#logScreen.show{
opacity:1;
pointer-events:auto;
}

.log-box{
width:75vw;
max-width:950px;
height:72vh;
border:1px solid white;
padding:55px;
}

.title{
font-size:38px;
margin-bottom:40px;
letter-spacing:1px;
}

.rose{
color:pink;
}

#text{
font-size:34px;
line-height:1.8;
white-space:pre-wrap;
}

.cursor{
animation:blink 1s step-end infinite;
}

@keyframes blink{
50%{
opacity:0;
}
}

.trigger{
color:pink;
cursor:pointer;
}

.trigger:hover{
opacity:.7;
}

</style>
</head>
<body>


<div id="logScreen">

<div class="log-box">

<div class="title">
<span class="rose">Rose's</span> log — 23/07/29
</div>

<div id="text"></div>

</div>

</div>

<script>

const segments=[

`Hey, my name's `,
`[[Belle.]]`,

` No lol it's actually not.
It's `,
`[[Rose.]]`,

` `,
`[[Rose]].`,

` I feel like a loser all the time.
Maybe I AM or something.
This Treslopine is pretty cool I have to `,
`[[say.]]`,

` I feel... good.`

];

const box=document.getElementById("text");

let segment=0;
let i=0;


/* fade in first */
setTimeout(function(){

document
.getElementById("logScreen")
.classList.add("show");

},500);


/* wait, then begin typing */
setTimeout(function(){

typeSegment();

},3800);



function typeSegment(){

if(segment>=segments.length){
return;
}

let current=segments[segment];

if(current.includes("[[")){

let word=
current
.replace("[[","")
.replace("]]","");

box.innerHTML +=
'<span class="trigger" onclick="continueTyping()">'+
word+
'</span>';

return;
}

function typeLetter(){

if(i>=current.length){
i=0;
segment++;
typeSegment();
return;
}

box.innerHTML=
box.innerHTML+
current.charAt(i)+
'<span class="cursor">|</span>';

box.innerHTML=
box.innerHTML.replace(
/<span class="cursor">\|<\/span>(?!.*cursor)/g,
''
);

let speed=
34+Math.random()*22;

if(current[i]==="."){
speed=180;
}

if(current[i]===","){
speed=120;
}

i++;

setTimeout(
typeLetter,
speed
);

}

typeLetter();

}


function continueTyping(){

let triggers=
document.querySelectorAll(".trigger");

triggers.forEach(t=>{
t.onclick=null;
});

segment++;

typeSegment();

}

</script>

</body>
</html>
