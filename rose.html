<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rose</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
height:100vh;
overflow:hidden;
font-family:'VT323', monospace;
}

#logScreen{
opacity:0;
pointer-events:none;
transition:opacity 2.5s ease;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#logScreen.show{
opacity:1;
pointer-events:auto;
}

.log-box{
width:75vw;
max-width:950px;
height:72vh;
border:1px solid white;
padding:55px;
overflow-y:auto;
scrollbar-width:none;
}

.log-box::-webkit-scrollbar{
display:none;
}

.title{
font-size:38px;
margin-bottom:40px;
}

.rose{
color:pink;
}

#text{
font-size:34px;
line-height:1.8;
white-space:pre-wrap;
}

.cursor{
animation:blink 1s step-end infinite;
}

@keyframes blink{
50%{opacity:0;}
}

.trigger{
color:pink;
cursor:pointer;
}

.blue{
color:darkblue;
cursor:pointer;
}

.trigger:hover,
.blue:hover,
.decision:hover{
opacity:.75;
}

.decision{
display:block;
margin-top:30px;
color:pink;
cursor:pointer;
}
</style>
</head>
<body>

<div id="logScreen">
<div class="log-box">

<div class="title">
<span class="rose">Rose's</span> log — 23/07/29
</div>

<div id="text"></div>

</div>
</div>

<script>

const segments=[

`Hey! My name’s `,
`[[Belle.]]`,

` JOKE! `,
`[[It’s Rose.]]`,

` But I guess you already knew `,
`[[that.]]`,

` Whoever you `,
`[[are…]]`,

` I’m living in Randwood at the moment, as I always have.

With my `,
`[[Mum.]]`,

` She didn’t used to be but she really is the WORST `,
`[[now.]]`,

` `,
`[[Lol.]]`,

`
I don’t know what happened!

I graduated high school last year — Randwood College ofc — and things have been weeeiiiiirrrrrddddd ever `,
`[[since…]]`,

`
I started urban planning at Melbourne Uni and I met some awesome girls in my classes and things were exciting and I was super okay but then I really `,
`[[wasn’t…]]`,

` `,
`[[all of a sudden!]]`,

`
All of a sudden I started getting all existential and depressed; I’d seriously never had that happen `,
`[[before.]]`,

`
I remember being in class and it was the sunniest day ever — like so sunny, sunlight was permeating the room and the mullions were casting beautiful shadows at a sharp angle on the misshapen tables and I could see all that, I could, but it all had this weird tinge of `,

`[[dark blue!]]`,

`
Dark blue everywhere.

Navy something.

Everything and everyone was friggin `,

`[[DARK BLUE! …]]`

];


const box=document.getElementById("text");

let segment=0;
let i=0;


setTimeout(function(){
document
.getElementById("logScreen")
.classList.add("show");
},500);


setTimeout(function(){
typeSegment();
},3800);



function typeSegment(){

if(segment>=segments.length){
showDecisions();
return;
}

let current=segments[segment];


if(current.includes("[[")){

let word=current
.replace("[[","")
.replace("]]","");


let className="trigger";

if(
word==="dark blue!" ||
word==="DARK BLUE! …"
){
className="blue";
}


box.innerHTML+=
'<span class="'+className+'" onclick="continueTyping()">'+
word+
'</span>';

box.scrollTop=box.scrollHeight;

return;
}



function typeLetter(){

if(i>=current.length){
i=0;
segment++;
typeSegment();
return;
}

box.innerHTML=
box.innerHTML+
current.charAt(i)+
'<span class="cursor">|</span>';

box.innerHTML=
box.innerHTML.replace(
/<span class="cursor">\|<\/span>(?!.*cursor)/g,
''
);


/* auto scroll while typing */
box.scrollTop=box.scrollHeight;


let speed=34+Math.random()*22;

if(current[i]==="."){
speed=180;
}

if(current[i]===","){
speed=120;
}

i++;

setTimeout(
typeLetter,
speed
);

}

typeLetter();

}



function continueTyping(){

document
.querySelectorAll(".trigger,.blue")
.forEach(t=>{
t.onclick=null;
});

segment++;

typeSegment();

}



function showDecisions(){

box.innerHTML+=`

<br><br>

<span class="decision"
onclick="chooseDecision('travel')">
Rose should travel!
</span>

<span class="decision"
onclick="chooseDecision('healthy')">
Rose should start healthier habits!
</span>

`;

box.scrollTop=box.scrollHeight;

}



function chooseDecision(choice){

localStorage.setItem(
'roseDecision',
choice
);

window.location.href='page2.html';

}

</script>

</body>
</html>
