<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Intro</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'VT323', monospace;
}

.message-box{
width:75vw;
max-width:950px;
height:72vh;
border:1px solid white;
padding:55px;
}

/* scrolling text area */
#text{
font-size:34px;
line-height:1.8;
white-space:pre-wrap;

height:100%;
overflow-y:auto;
padding-right:15px;

scrollbar-width:none;
}

#text::-webkit-scrollbar{
display:none;
}

.cursor{
animation:blink 1s step-end infinite;
}

@keyframes blink{
50%{
opacity:0;
}
}

.trigger{
color:lightblue;
cursor:pointer;
}

.trigger:hover{
opacity:.7;
}

.fade-out{
opacity:0;
transition:opacity 1.8s ease;
}

</style>
</head>
<body>

<div class="message-box">
<div id="text"></div>
</div>

<script>

const segments=[

`HEY!
How are you `,

`[[buddy?]]`,

`
We're so excited for you to join the Treslopine™®© `,

`[[team!]]`,

`
Like, `,

`[[so excited...]]`,

`
Your role is preeeettttttyyyyyy straight `,

`[[forward.]]`,

`
We're currently running a trial of Treslopine™®© in Melbourne, Australia annnnnnd wee need you to check out some of the activity logs these guys have been making and assess if they need more Treslopine™®©, or `,

`[[less.]]`,

`
SEE? Pretty effing easy, `,

`[[mate.]]`,

`
So... let's get you going!
Press below to see our first patient and their `,

`[[log!]]`

];


const box=document.getElementById("text");

let segment=0;
let i=0;


function typeSegment(){

if(segment>=segments.length){
return;
}

let current=segments[segment];


/* clickable trigger words */
if(current.includes("[[")){

let word=
current
.replace("[[","")
.replace("]]","");

box.innerHTML+=
'<span class="trigger" onclick="continueTyping()">'+
word+
'</span>';

/* keep newest trigger visible */
box.scrollTop=box.scrollHeight;

return;
}



function typeLetter(){

if(i>=current.length){

i=0;
segment++;
typeSegment();
return;

}

box.innerHTML=
box.innerHTML+
current.charAt(i)+
'<span class="cursor">|</span>';

box.innerHTML=
box.innerHTML.replace(
/<span class="cursor">\|<\/span>(?!.*cursor)/g,
''
);


/* auto scroll inside frame */
box.scrollTop=box.scrollHeight;


let speed=
34+Math.random()*22;

if(current[i]==="."){
speed=180;
}

if(current[i]===","){
speed=120;
}

i++;

setTimeout(
typeLetter,
speed
);

}

typeLetter();

}



function continueTyping(){

document
.querySelectorAll(".trigger")
.forEach(t=>{
t.onclick=null;
});

segment++;

if(segment>=segments.length){

document.body.classList.add(
"fade-out"
);

setTimeout(function(){

window.location.href="page2.html";

},1800);

return;

}

typeSegment();

}


setTimeout(
typeSegment,
800
);

</script>

</body>
</html>
