<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Intro</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'VT323', monospace;
}

.message-box{
width:75vw;
max-width:950px;
height:72vh;
border:1px solid white;
padding:55px;
}

#text{
font-size:34px;
line-height:1.8;
white-space:pre-wrap;

height:100%;
overflow-y:auto;
padding-right:15px;

scrollbar-width:none;
}

#text::-webkit-scrollbar{
display:none;
}

.cursor{
animation:blink 1s step-end infinite;
}

@keyframes blink{
50%{
opacity:0;
}
}

.trigger{
color:lightblue;
cursor:pointer;
}

.trigger:hover{
opacity:.7;
}

.fade-out{
opacity:0;
transition:opacity 1.8s ease;
}

</style>
</head>
<body>

<div class="message-box">
<div id="text"></div>
</div>

<!-- 🎵 BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
  <source src="audio/intro-anthem-main.mp3" type="audio/mpeg">
</audio>

<script>

const segments=[

`HEY!

How are you `,

`[[buddy?]]`,

`

Are you ready to get to `,

`[[work?]]`,

`

GREAT! I assume you said YES and not NO. `,

`[[Haha.]]`,

`

Okay so we need YOU to make some `,

`[[decisions.]]`,

`

You're going to be some sort of GOD basically for all the residents of `,

`[[Randwood.]]`,

`

These people are lost and they `,

`[[don’t even know it. They don't know anything!]]`,

`

These people need decisions `,

`[[from you.]]`,

`

You’ll be monitoring blogs from these individuals and you’ll be making decisions for `,

`[[them.]]`,

`

`,

`[[Easy decisions.]]`,

` `,

`[[Hard decisions.]]`,

` `,

`[[Every decision!]]`,

`
Some will be more straight forward than others.

Some will be weird and strange and strange and `,

`[[weird.]]`,

`

But that’s `,

`[[okay.]]`,

`

You’re going to be `,

`[[okay.]]`,

`

Your first individual is ready to be assessed.

Go on. `,

`[[Go.]]`

];

const box=document.getElementById("text");

/* 🎵 music setup */
const music = document.getElementById("bgMusic");
music.volume = 0.6;
let musicStarted = false;

let segment=0;
let i=0;

function typeSegment(){

if(segment>=segments.length){
return;
}

let current=segments[segment];

/* clickable trigger words */
if(current.includes("[[")){

let word=
current
.replace("[[","")
.replace("]]","");

box.innerHTML+=
'<span class="trigger" onclick="continueTyping()">'+
word+
'</span>';

box.scrollTop=box.scrollHeight;

return;
}

function typeLetter(){

if(i>=current.length){
i=0;
segment++;
typeSegment();
return;
}

box.innerHTML=
box.innerHTML+
current.charAt(i)+
'<span class="cursor">|</span>';

box.innerHTML=
box.innerHTML.replace(
/<span class="cursor">\|<\/span>(?!.*cursor)/g,
''
);

box.scrollTop=box.scrollHeight;

let speed=34+Math.random()*22;

if(current[i]==="."){
speed=180;
}

if(current[i]===","){
speed=120;
}

i++;

setTimeout(typeLetter,speed);

}

typeLetter();

}

function continueTyping(){

/* 🔊 start music on first user interaction */
if(!musicStarted){
music.play();
musicStarted = true;
}

document
.querySelectorAll(".trigger")
.forEach(t=>{
t.onclick=null;
});

segment++;

if(segment>=segments.length){

/* 🎵 fade out music */
let fadeAudio = setInterval(function(){

if(music.volume > 0.02){
music.volume -= 0.02;
}else{
music.volume = 0;
clearInterval(fadeAudio);
music.pause();
}

},60);

/* fade screen */
document.body.classList.add("fade-out");

setTimeout(function(){
window.location.href="page2.html";
},1800);

return;

}

typeSegment();

}

/* start typing ONLY (no autoplay audio) */
setTimeout(function(){
typeSegment();
},800);

</script>

</body>
</html>
